version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env.example

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      API_BASE_URL: http://backend:4000
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - backend
